# Application Config
# LOCAL DEV: port 5000 | PRODUCTION: Railway sets PORT automatically
server.port=${SERVER_PORT:5000}

# ─────────────────────────────────────────────────────────────────
# PostgreSQL Database
# LOCAL DEV:   Uses localhost:5432 with DB_PASSWORD from .env
# PRODUCTION:  Railway sets DATABASE_URL, PGUSER, PGPASSWORD automatically
# ─────────────────────────────────────────────────────────────────
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/postgres}
spring.datasource.username=${PGUSER:postgres}
spring.datasource.password=${PGPASSWORD:${DB_PASSWORD}}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
# ⚠️ SQL logging disabled for security (was leaking query data in logs)
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.default_schema=public
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# JWT
# ⚠️ Set JWT_SECRET as an environment variable. Use a strong random 32+ character key!
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# ─────────────────────────────────────────────────────────────────────────────
# ✅ HTTPS / SSL CONFIGURATION (Production Only)
#
# STEP 1: Get a free SSL certificate from Let's Encrypt using Certbot:
#   sudo certbot certonly --standalone -d yourdomain.com
#
# STEP 2: Convert the certificate to PKCS12 format (Java-compatible keystore):
#   sudo openssl pkcs12 -export \
#     -in /etc/letsencrypt/live/yourdomain.com/fullchain.pem \
#     -inkey /etc/letsencrypt/live/yourdomain.com/privkey.pem \
#     -out keystore.p12 \
#     -name erp-ms \
#     -CAfile /etc/letsencrypt/live/yourdomain.com/chain.pem \
#     -caname root
#   (Set a password when prompted — use the same as KEYSTORE_PASSWORD below)
#
# STEP 3: Set environment variables:
#   KEYSTORE_PASSWORD=your_keystore_password
#
# STEP 4: Uncomment the lines below, set your domain, and change port to 443:
# ─────────────────────────────────────────────────────────────────────────────
# server.port=443
# server.ssl.enabled=true
# server.ssl.key-store=classpath:keystore.p12
# server.ssl.key-store-password=${KEYSTORE_PASSWORD}
# server.ssl.key-store-type=PKCS12
# server.ssl.key-alias=erp-ms
#
# Optional: Redirect HTTP (port 80) to HTTPS (port 443)
# server.http-to-https-redirect.enabled=true

